<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <a class="navbar-brand" href="{% url 'onlinecourse:index' %}">Online Course</a>
</nav>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <h2>Login</h2>
            {% if message %}
            <div class="alert alert-danger">{{ message }}</div>
            {% endif %}
            <form method="post" action="{% url 'onlinecourse:login' %}">
                {% csrf_token %}
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" class="form-control" name="username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" name="psw" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Login</button>
            </form>
            <p class="mt-3">Don't have an account? <a href="{% url 'onlinecourse:registration' %}">Register</a></p>
        </div>
    </div>
</div>
</body>
</html>
